<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sample Page</title>
</head>
<body>
  <div class="container">
    <h1>Photo Gallery</h1>
    <p>Below are several images with the same class but different sources.</p>
    <ul>
      <li>First photo</li>
      <li>Second photo</li>
      <li>Third photo</li>
    </ul>
    <div class="gallery">
      <img class="target-img" src="images/photo-1.jpg" alt="Photo 1">
      <img class="other-img" src="images/other.jpg" alt="Other">
      <img class="target-img" src="images/photo-2.jpg" alt="Photo 2">
      <p>Some descriptive text between images.</p>
      <img class="target-img" src="images/photo-3.jpg" alt="Photo 3">
      <div class="nested">
        <img class="target-img" src="images/photo-4.jpg" alt="Photo 4">
      </div>
      <img class="target-img" src="images/photo-5.jpg" alt="Photo 5">
    </div>
  </div>
</body>
</html>
