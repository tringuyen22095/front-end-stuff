<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Tag Matcher</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f8f9fa;
    }

    .form-card {
      width: 100%;
      max-width: 640px;
    }

    #results {
      white-space: pre-wrap;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 0.875rem;
      max-height: 240px;
      overflow-y: auto;
    }

    .spinner-border {
      width: 1.25rem;
      height: 1.25rem;
    }
  </style>
</head>
<body>
  <div class="form-card card shadow-sm">
    <div class="card-body p-4">
      <h1 class="h4 text-center mb-4">HTML Tag Matcher</h1>
      <form id="matcher-form">
        <div class="mb-3">
          <label for="file-input" class="form-label">HTML/XML files</label>
          <input type="file" class="form-control" id="file-input" accept=".html,.htm,.xml,.xhtml" required multiple>
        </div>
        <div class="mb-3">
          <label for="regex-input" class="form-label">Regex (raw pattern)</label>
          <input type="text" class="form-control" id="regex-input" value='<img[^>]*class="target-img"[^>]*>' required>
        </div>
        <div class="mb-3">
          <label for="attribute-input" class="form-label">Attribute name</label>
          <input type="text" class="form-control" id="attribute-input" value="src">
        </div>
        <div class="mb-3">
          <label for="mode-select" class="form-label">Extraction mode</label>
          <select class="form-select" id="mode-select">
            <option value="attribute" selected>Extract attribute</option>
            <option value="full">Full matched tag</option>
          </select>
        </div>
        <div class="mb-3 form-check">
          <input type="checkbox" class="form-check-input" id="prefix-enable">
          <label class="form-check-label" for="prefix-enable">Enable URL/path prefix</label>
        </div>
        <div class="mb-3 d-none" id="prefix-container">
          <label for="prefix-input" class="form-label">Prefix URL/path</label>
          <input type="text" class="form-control" id="prefix-input" list="prefix-list" placeholder="https://xx.knit.bid/">
          <datalist id="prefix-list"></datalist>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-primary" id="submit-btn">
            <span id="btn-text">Next</span>
            <span id="btn-spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
          </button>
        </div>
      </form>
      <div id="status-area" class="alert alert-info mt-3 d-none" role="alert"></div>
      <div id="results-area" class="mt-3 d-none">
        <div class="d-flex justify-content-between align-items-center mb-2">
          <h2 class="h6 mb-0">Results preview</h2>
          <div>
            <button type="button" class="btn btn-outline-secondary btn-sm" id="copy-btn">Copy to clipboard</button>
            <button type="button" class="btn btn-outline-secondary btn-sm ms-2" id="download-btn">Download output.txt</button>
          </div>
        </div>
        <pre id="results" class="border rounded bg-white p-3 mb-0"></pre>
      </div>
    </div>
  </div>

  <script src="matcher.js"></script>
  <script>
    const form = document.getElementById('matcher-form');
    const fileInput = document.getElementById('file-input');
    const regexInput = document.getElementById('regex-input');
    const attributeInput = document.getElementById('attribute-input');
    const modeSelect = document.getElementById('mode-select');
    const prefixEnable = document.getElementById('prefix-enable');
    const prefixContainer = document.getElementById('prefix-container');
    const prefixInput = document.getElementById('prefix-input');
    const submitBtn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnSpinner = document.getElementById('btn-spinner');
    const statusArea = document.getElementById('status-area');
    const resultsArea = document.getElementById('results-area');
    const resultsEl = document.getElementById('results');
    const copyBtn = document.getElementById('copy-btn');
    const downloadBtn = document.getElementById('download-btn');

    let latestOutput = '';

    const LOCAL_STORAGE_KEY = 'htmlTagMatcherPrefixes';

    function getPrefixes() {
      try {
        const stored = localStorage.getItem(LOCAL_STORAGE_KEY);
        if (stored) {
          const parsed = JSON.parse(stored);
          if (Array.isArray(parsed)) {
            return parsed;
          }
        }
      } catch (e) {
        // ignore
      }
      const defaultPrefixes = ["https://xx.knit.bid/"];
      localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(defaultPrefixes));
      return defaultPrefixes;
    }

    function updatePrefixDatalist() {
      const prefixes = getPrefixes();
      const datalist = document.getElementById('prefix-list');
      datalist.innerHTML = '';
      prefixes.forEach(prefix => {
        const option = document.createElement('option');
        option.value = prefix;
        datalist.appendChild(option);
      });
    }

    function savePrefix(prefixValue) {
      const trimmed = prefixValue.trim();
      if (!trimmed) return;
      let prefixes = getPrefixes();
      if (!prefixes.includes(trimmed)) {
        prefixes.push(trimmed);
        localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(prefixes));
        updatePrefixDatalist();
      }
    }

    prefixEnable.addEventListener('change', () => {
      if (prefixEnable.checked) {
        prefixContainer.classList.remove('d-none');
      } else {
        prefixContainer.classList.add('d-none');
      }
    });

    // Initialize datalist on page load
    updatePrefixDatalist();

    function setLoading(isLoading) {
      submitBtn.disabled = isLoading;
      btnSpinner.classList.toggle('d-none', !isLoading);
      btnText.textContent = isLoading ? 'Processing...' : 'Next';
    }

    function readFile(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = () => reject(reader.error);
        reader.readAsText(file);
      });
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();

      const files = fileInput.files;
      if (!files || files.length === 0) {
        return;
      }

      setLoading(true);
      statusArea.classList.add('d-none');
      resultsArea.classList.add('d-none');

      try {
        await new Promise((resolve) => setTimeout(resolve, 150));

        let allMatches = [];
        for (let i = 0; i < files.length; i++) {
          const file = files[i];
          const content = await readFile(file);
          const matches = extractMatches(content, regexInput.value, {
            flags: 'gi',
            mode: modeSelect.value,
            attributeName: attributeInput.value.trim() || 'src',
          });
          allMatches = allMatches.concat(matches);
        }

        const isPrefixEnabled = prefixEnable.checked;
        const rawPrefix = prefixInput.value;
        const hasValidPrefix = isPrefixEnabled && rawPrefix.trim() !== '';

        if (hasValidPrefix) {
          savePrefix(rawPrefix);
          allMatches = applyPrefixToMatches(allMatches, rawPrefix);
        }

        latestOutput = allMatches.length > 0 ? `${allMatches.join('\n')}\n` : '';

        resultsEl.textContent = latestOutput || '(no matches)';
        statusArea.textContent = `Found ${allMatches.length} match${allMatches.length === 1 ? '' : 'es'}.`;
        statusArea.classList.remove('d-none', 'alert-danger');
        statusArea.classList.add('alert-info');
        resultsArea.classList.remove('d-none');
      } catch (error) {
        statusArea.textContent = error.message || 'Failed to process files.';
        statusArea.classList.remove('d-none', 'alert-info');
        statusArea.classList.add('alert-danger');
      } finally {
        setLoading(false);
      }
    });

    copyBtn.addEventListener('click', async () => {
      if (!latestOutput) {
        return;
      }
      try {
        await navigator.clipboard.writeText(latestOutput);
        const originalText = copyBtn.textContent;
        copyBtn.textContent = 'Copied!';
        setTimeout(() => {
          copyBtn.textContent = originalText;
        }, 1500);
      } catch (err) {
        // Fallback for non-secure contexts
        const textarea = document.createElement('textarea');
        textarea.value = latestOutput;
        textarea.style.position = 'fixed';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          const originalText = copyBtn.textContent;
          copyBtn.textContent = 'Copied!';
          setTimeout(() => {
            copyBtn.textContent = originalText;
          }, 1500);
        } catch (e) {
          console.error('Fallback copy failed', e);
        }
        document.body.removeChild(textarea);
      }
    });

    downloadBtn.addEventListener('click', () => {
      const blob = new Blob([latestOutput], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = 'output.txt';
      link.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
